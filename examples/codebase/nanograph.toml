[project]
name = "Codebase Agent Workspace"
description = "Persistent planning graph for AI agents. Issues, dependencies, decisions, and audit. Inspired by beads."
instruction = "Run commands from this directory. Start with 'nanograph run ready' to see what to work on next. Use 'similar' before creating new issues to avoid duplicates. Use 'decisions_for' to surface prior rationale."

[db]
default_path = "codebase.nano"

[schema]
default_path = "codebase.pg"

[query]
roots = ["."]

[embedding]
provider = "mock"
chunk_size = 1500
chunk_overlap_chars = 200

[cli]
output_format = "table"

# ── Workflow (the headline aliases) ────────────────────────────

[query_aliases.ready]
query = "codebase.gq"
name = "ready"
format = "table"

[query_aliases.queue]
query = "codebase.gq"
name = "my_queue"
args = ["agent"]
format = "table"

[query_aliases.active]
query = "codebase.gq"
name = "active_work"
format = "table"

# ── Dependency graph ──────────────────────────────────────────

[query_aliases.blockers]
query = "codebase.gq"
name = "blockers"
args = ["slug"]
format = "table"

[query_aliases.chain]
query = "codebase.gq"
name = "blocking_chain"
args = ["slug"]
format = "table"

[query_aliases.unblocks]
query = "codebase.gq"
name = "blocked_by_me"
args = ["slug"]
format = "table"

# ── Issue detail & listing ────────────────────────────────────

[query_aliases.detail]
query = "codebase.gq"
name = "issue_detail"
args = ["slug"]
format = "kv"

[query_aliases.open]
query = "codebase.gq"
name = "open_issues"
format = "table"

[query_aliases.unassigned]
query = "codebase.gq"
name = "unassigned_open"
format = "table"

[query_aliases.my]
query = "codebase.gq"
name = "agent_issues"
args = ["agent"]
format = "table"

# ── Search ────────────────────────────────────────────────────

[query_aliases.find]
query = "codebase.gq"
name = "search_issues"
args = ["q"]
format = "table"

[query_aliases.similar]
query = "codebase.gq"
name = "similar_issues"
args = ["q"]
format = "table"

# ── Epic hierarchy ────────────────────────────────────────────

[query_aliases.tree]
query = "codebase.gq"
name = "epic_tree"
args = ["epic"]
format = "table"

[query_aliases.progress]
query = "codebase.gq"
name = "epic_progress"
args = ["epic"]
format = "table"

[query_aliases.epics]
query = "codebase.gq"
name = "open_epics"
format = "table"

# ── Messages ──────────────────────────────────────────────────

[query_aliases.thread]
query = "codebase.gq"
name = "thread"
args = ["root"]
format = "table"

# ── Decisions ─────────────────────────────────────────────────

[query_aliases.why]
query = "codebase.gq"
name = "search_decisions"
args = ["q"]
format = "kv"

[query_aliases.decisions]
query = "codebase.gq"
name = "decisions_for"
args = ["slug"]
format = "kv"

# ── Modules ───────────────────────────────────────────────────

[query_aliases.mod]
query = "codebase.gq"
name = "issues_in_module"
args = ["mod"]
format = "table"

[query_aliases.experts]
query = "codebase.gq"
name = "module_experts"
args = ["mod"]
format = "table"

[query_aliases.reviewers]
query = "codebase.gq"
name = "review_candidates"
args = ["slug"]
format = "table"

[query_aliases.backlog]
query = "codebase.gq"
name = "module_backlog"
format = "table"

# ── Constraints ───────────────────────────────────────────────

[query_aliases.checks]
query = "codebase.gq"
name = "issue_constraints"
args = ["slug"]
format = "table"

[query_aliases.mod-checks]
query = "codebase.gq"
name = "module_constraints"
args = ["mod"]
format = "table"

# ── Audit ─────────────────────────────────────────────────────

[query_aliases.history]
query = "codebase.gq"
name = "recent_events"
args = ["slug"]
format = "table"

# ── Mutations ─────────────────────────────────────────────────

[query_aliases.claim]
query = "codebase.gq"
name = "claim_issue"
args = ["slug", "agent"]
format = "table"

[query_aliases.close]
query = "codebase.gq"
name = "close_issue"
args = ["slug", "reason"]
format = "table"

[query_aliases.review]
query = "codebase.gq"
name = "submit_for_review"
args = ["slug"]
format = "table"
